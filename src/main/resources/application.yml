spring:
  application:
    name: multitenant
  datasource:
    url: jdbc:postgresql://localhost:5432/multitenant
    username: postgres
    password: masterkey
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: true

multitenancy:
  tenants:
    - identifier: ey
      enabled: true
    - identifier: eurofarma
      enabled: true
    - identifier: idbrasil
      enabled: false